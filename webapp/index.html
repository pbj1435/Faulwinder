<!DOCTYPE html>

<title>Faulwinder — Config</title>
<style>
  :root{color-scheme:dark;}

  background:#10141a;color:#e6eaf0;}
  h1{font-size:20px;} button{font-size:15px;padding:10px 16px;border-radius:8px;border:1px solid #2f8fb0;
